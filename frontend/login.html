<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Lost & Found System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-animated"></div>
  <div class="bg-grid"></div>

  <div class="page-wrapper auth-container">
    
    <div class="auth-card anim-ready delay-1 w-full max-w-md mx-auto">
      <div class="auth-icon animate-[breathe_3s_infinite]">
        <i class="fa-solid fa-fingerprint"></i>
      </div>
      
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Verify your identity to access the portal</p>

      <div class="space-y-5">
        <div class="form-group mb-0">
          <label class="form-label">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-envelope"></i>
            </div>
            <input type="email" id="email" class="glass-input pl-10 w-full" placeholder="you@college.edu">
          </div>
        </div>

        <div class="form-group mb-0">
          <label class="form-label">Password</label>
          <div class="relative flex">
             <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 z-10">
              <i class="fa-solid fa-lock"></i>
            </div>
            <input type="password" id="password" class="glass-input pl-10 w-full rounded-r-none border-r-0" placeholder="••••••••">
            <button class="btn-ghost rounded-l-none border-l-0 px-4" type="button" onclick="togglePassword()" style="margin:0;">
              <i class="fa-regular fa-eye text-slate-400 hover:text-cyan-400 transition-colors" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button class="btn-glow btn-primary-glow btn-block mt-6 flex justify-center py-3 text-lg" onclick="login()">
          Authenticate <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
        </button>

        <p id="msg" class="msg-text msg-error"></p>
      </div>

      <div class="auth-footer">
        New to the system? <a href="register.html">Create Access Node</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="js/animations.js"></script>
  <script>
    function togglePassword() {
      const pass = document.getElementById("password");
      const icon = document.getElementById("eyeIcon");
      if (pass.type === "password") {
        pass.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        pass.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }
  </script>
</body>
</html>
