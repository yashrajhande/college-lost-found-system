<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Lost & Found System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-animated"></div>
  <div class="bg-grid"></div>

  <div class="page-wrapper auth-container">
    
    <div class="auth-card anim-ready delay-1 w-full max-w-md mx-auto">
      <div class="auth-icon animate-[breathe_3s_infinite] bg-gradient-to-br from-emerald-500 to-green-600 shadow-[0_8px_32px_rgba(16,185,129,0.2)]">
        <i class="fa-solid fa-user-plus"></i>
      </div>
      
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Register to report lost and found items</p>

      <div class="space-y-4">
        
        <div class="form-group mb-0">
          <label class="form-label">Full Name</label>
          <div class="relative">
             <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-user"></i>
            </div>
            <input type="text" id="name" class="glass-input pl-10 w-full" placeholder="John Doe">
          </div>
        </div>

        <div class="form-group mb-0">
          <label class="form-label">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-envelope"></i>
            </div>
            <input type="email" id="email" class="glass-input pl-10 w-full" placeholder="you@college.edu">
          </div>
        </div>

        <div class="form-group mb-0">
          <label class="form-label">PRN Number</label>
          <div class="relative">
             <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-id-card"></i>
            </div>
            <input type="text" id="prn" class="glass-input pl-10 w-full" placeholder="e.g. 120B00000">
          </div>
        </div>

        <div class="form-group mb-0">
          <label class="form-label">Role</label>
          <div class="relative">
             <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-users"></i>
            </div>
            <select id="role" class="glass-select pl-10 w-full appearance-none">
              <option value="student">Student</option>
              <option value="teacher">Teacher / Staff</option>
            </select>
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-chevron-down text-xs"></i>
            </div>
          </div>
        </div>

        <div class="form-group mb-0">
          <label class="form-label">Password</label>
          <div class="relative flex">
             <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 z-10">
              <i class="fa-solid fa-lock"></i>
            </div>
            <input type="password" id="password" class="glass-input pl-10 w-full rounded-r-none border-r-0" placeholder="••••••••">
            <button class="btn-ghost rounded-l-none border-l-0 px-4" type="button" onclick="togglePassword()" style="margin:0;">
              <i class="fa-regular fa-eye text-slate-400 hover:text-cyan-400 transition-colors" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button class="btn-glow btn-success-glow btn-block mt-6 flex justify-center py-3 text-lg" onclick="registerUser()">
          Register <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
        </button>

        <p id="reg_msg" class="msg-text msg-error"></p>
      </div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login Here</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="js/animations.js"></script>
  <script>
    function togglePassword() {
      const pass = document.getElementById("password");
      const icon = document.getElementById("eyeIcon");
      if (pass.type === "password") {
        pass.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        pass.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }
  </script>
</body>
</html>
